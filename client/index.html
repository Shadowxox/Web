<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Waifu Home</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">

  <!-- Top -->
  <div class="top-bar">
    <input type="text" id="search" placeholder="Search waifu...">
    <img id="pfp" src="">
  </div>

  <!-- Title -->
  <h2>Collection</h2>

  <!-- Grid -->
  <div id="grid"></div>

</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="nav-btn active">🏡</div>
  <div class="nav-btn">🛍️</div>
</div>

<!-- Popup Modal -->
<div id="popup" class="popup hidden">
  <div class="popup-box">

    <div class="close-btn" id="closePopup">✖</div>

    <img id="popup-img" src="">

    <pre id="popup-text"></pre>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
