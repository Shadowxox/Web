<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Waifu Home</title>

  <!-- Telegram WebApp -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="overlay">

  <!-- Top -->
  <div class="top-bar">
    <input type="text" id="search" placeholder="Search waifu...">
    <img id="pfp" src="">
  </div>

  <!-- Title -->
  <h2>Collection</h2>

  <!-- Grid -->
  <div id="grid"></div>

</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="nav-btn active">🏡</div>
  <div class="nav-btn">🛍️</div>
</div>

<!-- Popup Modal -->
<div id="popup" class="popup hidden">
  <div class="popup-box">
    <div class="close-btn" id="closePopup">✖</div>
    <img id="popup-img" src="">
    <pre id="popup-text"></pre>
  </div>
</div>

<!-- PROFILE POPUP -->
<div id="profilePopup" class="popup hidden">
  <div class="popup-box">
    <div class="close-btn" id="closeProfile">✖</div>
    <h2>USER INFORMATION</h2>
    <img id="profile-pfp" class="big-pfp" src="">
    <h3 id="profile-id"></h3>
    <pre id="profile-text"></pre>
  </div>
</div>

<script>
let tg = window.Telegram.WebApp;
tg.expand();

// 👤 Set Profile Pic
let user = tg.initDataUnsafe.user;
if (user && user.photo_url) {
  document.getElementById("pfp").src = user.photo_url;
  document.getElementById("profile-pfp").src = user.photo_url;
  document.getElementById("profile-id").innerText = user.id;
} else {
  document.getElementById("pfp").src = "https://i.imgur.com/DefaultPfp.png";
}

// 🔥 BACKEND URL (CHANGE THIS)
const API = "https://web-7x2t.onrender.com";

let allData = [];

// 📡 Fetch Data
async function loadWaifus() {
  try {
    const res = await fetch(API);
    const data = await res.json();
    allData = data;
    render(data);
  } catch (err) {
    console.log("Error loading data", err);
  }
}

// 🎨 Render Grid
function render(data) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${item.image || item.img}" />
      <p>${item.name || "Unknown"}</p>
    `;

    // 📦 Popup click
    card.onclick = () => {
      document.getElementById("popup-img").src = item.image || item.img;
      document.getElementById("popup-text").innerText =
        `Name: ${item.name}\nAnime: ${item.anime}\nRarity: ${item.rarity}`;
      document.getElementById("popup").classList.remove("hidden");
    };

    grid.appendChild(card);
  });
}

// 🔍 Search
document.getElementById("search").addEventListener("input", (e) => {
  const value = e.target.value.toLowerCase();

  const filtered = allData.filter(w =>
    (w.name || "").toLowerCase().includes(value) ||
    (w.anime || "").toLowerCase().includes(value)
  );

  render(filtered);
});

// ❌ Close popup
document.getElementById("closePopup").onclick = () => {
  document.getElementById("popup").classList.add("hidden");
};

// 👤 Open profile
document.getElementById("pfp").onclick = () => {
  document.getElementById("profilePopup").classList.remove("hidden");

  document.getElementById("profile-text").innerText =
    `Username: ${user?.username || "N/A"}`;
};

// ❌ Close profile
document.getElementById("closeProfile").onclick = () => {
  document.getElementById("profilePopup").classList.add("hidden");
};

// 🚀 Load on start
loadWaifus();
</script>

</body>
</html>
